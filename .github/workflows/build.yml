name: Build FakeJob APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set Java 17
        run: |
          echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV
          echo "$JAVA_HOME_17_X64/bin" >> $GITHUB_PATH

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip git zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            build-essential ccache

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install cython==0.29.33
          pip install git+https://github.com/kivy/buildozer.git@master
          pip install git+https://github.com/kivy/python-for-android.git@master

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build APK
        env:
          ANDROID_NDK: ""
          ANDROID_NDK_HOME: ""
          ANDROID_NDK_ROOT: ""
        run: |
          buildozer android debug 2>&1 | tee build.log
        timeout-minutes: 60

      - name: Find and copy APK to output folder
        if: always()
        run: |
          echo "=== All APK files found ==="
          find /home/runner/work -name "*.apk" 2>/dev/null
          mkdir -p apk_output
          find /home/runner/work -name "*.apk" -exec cp {} apk_output/ \; 2>/dev/null
          ls -la apk_output/

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: FakeJobDetector-APK
          path: apk_output/
          if-no-files-found: warn

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
