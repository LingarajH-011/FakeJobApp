name: Build FakeJob APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip git zip unzip \
            openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            build-essential ccache

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.33

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build APK
        env:
          ANDROID_NDK: ""
          ANDROID_NDK_HOME: ""
          ANDROID_NDK_ROOT: ""
        run: |
          buildozer android debug 2>&1 | tee build.log
        timeout-minutes: 60

      - name: Find APK location
        if: always()
        run: |
          echo "=== Searching for APK files ==="
          find . -name "*.apk" 2>/dev/null
          echo "=== Contents of bin/ (if exists) ==="
          ls -la bin/ 2>/dev/null || echo "bin/ folder does not exist"
          echo "=== Contents of current directory ==="
          ls -la

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: FakeJobDetector-APK
          path: |
            bin/*.apk
            **/*.apk
          if-no-files-found: warn

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
